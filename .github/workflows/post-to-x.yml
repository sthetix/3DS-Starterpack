name: Post Release to X

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to post about'
        required: true
      release_title:
        description: 'Release title'
        required: true
      release_notes:
        description: 'Release notes'
        required: true

permissions:
  contents: read

jobs:
  post-to-x:
    runs-on: ubuntu-latest
    steps:
      - name: Post to X
        env:
          REPO: ${{ github.repository }}
          TITLE: ${{ inputs.release_title || github.event.release.name }}
          NOTES: ${{ inputs.release_notes || github.event.release.body }}
          TAG: ${{ inputs.release_tag || github.event.release.tag_name }}
          URL: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ inputs.release_tag || github.event.release.tag_name }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_KEY_SECRET: ${{ secrets.X_API_KEY_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: |
          echo "Posting to X.com..."

          pip install requests-oauthlib --quiet

          python3 << 'EOF'
          import os
          import re
          from requests_oauthlib import OAuth1Session

          notes = os.environ['NOTES']
          title = os.environ['TITLE']
          url = os.environ['URL']
          repo = os.environ['REPO']
          project_name = repo.split('/')[-1]

          def extract_highlights(notes):
              """Extract bullet points or first meaningful lines from release notes."""
              lines = notes.strip().splitlines()
              highlights = []
              for line in lines:
                  line = line.strip()
                  # Pick lines that look like bullet points
                  if line.startswith(('- ', '* ', '+ ', '• ')):
                      clean = re.sub(r'^[-*+•]\s*', '', line)
                      clean = re.sub(r'\*\*([^*]+)\*\*', r'\1', clean)  # strip bold
                      if clean:
                          highlights.append(clean)
                  if len(highlights) >= 4:
                      break
              return highlights

          highlights = extract_highlights(notes)

          tweet_lines = [f"{project_name} {title} is out!"]

          if highlights:
              tweet_lines.append("\n".join(f"• {h}" for h in highlights))

          download_line = f"Download: {url}"
          body_text = "\n\n".join(tweet_lines)

          # Keep the release URL intact. X counts URLs as shortened links, but
          # build safely so the visible post never loses the Download line.
          separator = "\n\n"
          max_body_len = 280 - len(separator) - len(download_line)
          if len(body_text) > max_body_len:
              body_text = body_text[:max(0, max_body_len - 3)].rstrip() + "..."

          tweet_text = f"{body_text}{separator}{download_line}"

          print(f"Tweet preview:\n{tweet_text}\n")

          api_key = os.environ['X_API_KEY']
          api_secret = os.environ['X_API_KEY_SECRET']
          access_token = os.environ['X_ACCESS_TOKEN']
          access_secret = os.environ['X_ACCESS_TOKEN_SECRET']

          oauth = OAuth1Session(
              client_key=api_key,
              client_secret=api_secret,
              resource_owner_key=access_token,
              resource_owner_secret=access_secret
          )

          response = oauth.post(
              "https://api.twitter.com/2/tweets",
              json={"text": tweet_text}
          )

          if response.status_code != 201:
              print(f"Error: {response.status_code}")
              print(response.text)
              exit(1)

          print("Tweet posted successfully!")
          print(f"Tweet URL: https://x.com/user/status/{response.json()['data']['id']}")
          EOF
